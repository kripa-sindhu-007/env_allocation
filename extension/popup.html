<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="noise"></div>

  <!-- Username + Role modal -->
  <div id="username-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-glyph">&#9881;</div>
      <h2>env<span class="blink">_</span>manager</h2>
      <p>identify yourself</p>
      <input type="text" id="username-input" placeholder="your_name" autocomplete="off" spellcheck="false">
      <div class="pin-group">
        <span class="pin-label">4-digit PIN</span>
        <div class="pin-boxes">
          <input class="pin-box" id="pin-0" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
          <input class="pin-box" id="pin-1" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
          <input class="pin-box" id="pin-2" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
          <input class="pin-box" id="pin-3" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        </div>
      </div>
      <p id="modal-error" class="modal-error"></p>
      <div class="role-selector">
        <button class="role-btn active" data-role="developer">Developer</button>
        <button class="role-btn" data-role="qa">QA</button>
      </div>
      <button id="username-save">Initialize</button>
    </div>
  </div>

  <!-- Reserve modal (shown when developer clicks Reserve) -->
  <div id="reserve-modal" class="modal-overlay" style="display:none">
    <div class="modal reserve-modal">
      <h2>Reserve <span id="reserve-env-name" class="reserve-env-name"></span></h2>
      <p>add a note and optionally notify QA</p>
      <input type="text" id="reserve-note-input" placeholder="What are you working on?" autocomplete="off" spellcheck="false">
      <div class="qa-select-section">
        <label class="qa-select-label">Notify QA (optional)</label>
        <div id="qa-select-list" class="qa-select-list"></div>
      </div>
      <div class="reserve-modal-actions">
        <button id="reserve-confirm" class="btn btn-reserve-confirm">Reserve</button>
        <button id="reserve-cancel" class="btn btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" style="display:none">
    <header class="header">
      <div class="header-left">
        <span class="header-logo">ENV</span>
        <h1>Manager</h1>
      </div>
      <div class="header-right">
        <button id="refresh-btn" class="btn-icon" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
        <!-- Notification bell (visible for QA users) -->
        <div id="notif-wrapper" class="notif-wrapper" style="display:none">
          <button id="notif-btn" class="btn-icon" title="Notifications">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-badge" class="notif-badge" style="display:none">0</span>
          </button>
          <div id="notif-dropdown" class="notif-dropdown" style="display:none">
            <div class="notif-dropdown-header">
              <span>Notifications</span>
              <button id="notif-mark-all" class="notif-mark-all">Mark all read</button>
            </div>
            <div id="notif-list" class="notif-list"></div>
          </div>
        </div>
        <span id="user-display" class="user-chip" title="Click to change name"></span>
      </div>
    </header>

    <!-- Group selector -->
    <div id="group-bar" class="group-bar"></div>

    <!-- Sub-tabs -->
    <nav id="tab-bar" class="tab-bar"></nav>

    <!-- Context banner -->
    <div id="context-banner" class="context-banner"></div>

    <!-- Search -->
    <div class="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" class="search-input" placeholder="Search environments..." autocomplete="off" spellcheck="false">
    </div>

    <div id="error-banner" class="error-banner" style="display:none"></div>
    <div id="loading" class="loading"><div class="spinner"></div></div>
    <div id="env-list"></div>

    <div class="activity-section">
      <div class="activity-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Recent Activity
      </div>
      <div id="activity-list"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
